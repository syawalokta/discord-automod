<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Topinz Bot</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#0f172a;
      color:white;
      font-family:Inter,sans-serif;

      display:flex;
      justify-content:center;
      align-items:center;

      min-height:100vh;
    }

    .card{
      text-align:center;
      padding:40px;
      border-radius:20px;

      background:#111827;
      border:1px solid #1f2937;
    }

    h1{
      margin-bottom:10px;
    }

    p{
      color:#94a3b8;
    }

    .status{
      margin-top:20px;
      color:#22c55e;
      font-weight:600;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>🤖 Topinz Bot</h1>

    <p>
      Discord Moderation &
      Verification Bot
    </p>

    <div class="status">
      ● Online
    </div>
  </div>

</body>
</html>
